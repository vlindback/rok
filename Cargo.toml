[workspace]
members = [
        "bin/rok-host",
        "engine",
        "libs/rok-abi",
        "libs/rok-core",
        "libs/rok-jobs",
        'libs/rok-log',
        "targets/rok-game",
]
resolver = "2"

# --- Workspace Inheritance ---
[workspace.package]
version = "0.1.0"
authors = ["Viktor Lindbäck"]
edition = "2024"

# --- Shared dependencies ---
[workspace.dependencies]
# Internal
rok-abi = { path = "libs/rok-abi" }
rok-core = { path = "libs/rok-core" }
rok-jobs = { path = "libs/rok-jobs" }
rok-log = { path = "libs/rok-log" }
# External
crossbeam = "0.8"
libloading = "0.8"

# --- Profiles ---
[profile.dev.package."*"]
opt-level = 3
